name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-code-review:
    if: ${{ !contains(github.event.pull_request.title, '--no-ai-review') }}
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      # 调试 npm 镜像源，下载trpc-claudecode包
      - name: Debug npm registry
        run: |
          npm config get registry
          npm view @tencent/trpc-claudecode --registry=https://mirrors.tencent.com/npm/ || true
          npm search trpc-claudecode --registry=https://mirrors.tencent.com/npm/ || true
            
      - name: Install trpc-claudecode
        run: npm install -g --registry=https://mirrors.tencent.com/npm/ @tencent/trpc-claudecode

      - name: Generate PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      # 运行 AI 代码审查
      - name: Run AI code review
        env:
          TRPC_CLAUDECODE_BASE_URL: ${{ secrets.TRPC_CLAUDECODE_BASE_URL }}
          TRPC_CLAUDECODE_API_KEY: ${{ secrets.TRPC_CLAUDECODE_API_KEY }}
          TRPC_CLAUDECODE_MODEL: ${{ secrets.TRPC_CLAUDECODE_MODEL }}
        run: |
          trpc-claudecode -p "$(cat .github/ai-review-prompt.md)" > review.md

      # 在 PR 中评论审查结果
      - name: Comment review result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = fs.readFileSync('review.md', 'utf8').trim();

            if (!body) {
              body = 'AI Code Review 未生成有效结果，请检查 GitHub Actions 日志。';
            }

            const { owner, repo } = context.repo;
            const sha = context.payload.pull_request.head.sha;

            body = body.replace(
              /`((?:\.?[\w.-]+\/)*[\w.-]+\.[A-Za-z0-9_+-]+):(\d+)(?:-(\d+))?`/g,
              (match, filePath, startLine, endLine) => {
                const encodedPath = filePath.split('/').map(encodeURIComponent).join('/');
                const label = `${filePath}:${startLine}${endLine ? `-${endLine}` : ''}`;
                const lineAnchor = `L${startLine}${endLine ? `-L${endLine}` : ''}`;
                const url = `https://github.com/${owner}/${repo}/blob/${sha}/${encodedPath}#${lineAnchor}`;
                return `[\`${label}\`](${url})`;
              }
            );

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body: `## AI Code Review\n\n${body}`
            });
      
      - name: Fail on critical findings
        run: |
          if grep -q "🚨 Critical" review.md; then
            echo "Critical issues found in AI Code Review"
            exit 1
          fi

      - name: Cleanup workspace
        if: always()
        run: |
          git clean -ffdx